    <script>

        let loaded = false;

        function playAudio() {

            if (loaded === false) {
                document.getElementById("audio").play();
            setTimeout(function() {
                document.getElementById("onload").style.display = "none";
            }, 6000);
            loaded = true;
            }
            
        }

        let buttons = document.getElementsByTagName("a");

        for (let i = 0; i < buttons.length; i++) {
            buttons[i].onclick = function() {
                //alert(buttons[i].innerHTML);
                buttons[i].style.borderTop = "3px solid #000";
                buttons[i].style.borderLeft = "3px solid #000";
                buttons[i].style.borderRight = "3px solid #fff";
                buttons[i].style.borderBottom = "3px solid #fff";
            };
        }


    </script>
